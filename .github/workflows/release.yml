name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  create-release:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_API_URL: /api
          VITE_TELEGRAM_BOT_USERNAME:
          VITE_APP_NAME: Cabinet
          VITE_APP_LOGO: V

      - name: Create dist archives
        run: |
          cd dist
          tar -czf ../bedolaga-cabinet-zmey-${{ github.ref_name }}.tar.gz .
          cd ..
          zip -r bedolaga-cabinet-zmey-${{ github.ref_name }}.zip dist/

      - name: Generate changelog from zmey_changelog.md
        id: changelog
        run: |
          # Достаём секцию для текущего тега из zmey_changelog.md
          TAG_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          SECTION=$(awk "/^## \[${TAG_VERSION}\]/,/^## \[/" zmey_changelog.md | head -n -1)
          if [ -z "$SECTION" ]; then
            # Если секции нет - берём git log между тегами
            PREV_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "")
            if [ -z "$PREV_TAG" ]; then
              SECTION="Первый релиз форка zmey93/bedolaga-cabinet"
            else
              SECTION=$(git log ${PREV_TAG}..${{ github.ref_name }} --pretty=format:"- %s (%h)" --no-merges)
            fi
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$SECTION" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get upstream version from package.json
        id: upstream
        run: |
          UPSTREAM_VERSION=$(node -p "require('./package.json').version")
          echo "version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ github.ref_name }} (upstream v${{ steps.upstream.outputs.version }})"
          body: |
            ## Изменения форка zmey93

            ${{ steps.changelog.outputs.changelog }}

            ---
            > **Upstream версия**: [`BEDOLAGA-DEV/bedolaga-cabinet v${{ steps.upstream.outputs.version }}`](https://github.com/BEDOLAGA-DEV/bedolaga-cabinet/releases/tag/v${{ steps.upstream.outputs.version }})

            ## Docker образ

            ```bash
            docker pull ghcr.io/zmey93/bedolaga-cabinet:${{ github.ref_name }}
            docker pull ghcr.io/zmey93/bedolaga-cabinet:latest
            ```

            ## Установка

            Смотри [README.md](https://github.com/zmey93/bedolaga-cabinet/blob/${{ github.ref_name }}/README.md)
          files: |
            bedolaga-cabinet-zmey-${{ github.ref_name }}.tar.gz
            bedolaga-cabinet-zmey-${{ github.ref_name }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
